<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wishlist — Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f6faf8] text-gray-800">
  <main class="container mx-auto max-w-6xl px-4 py-10 sm:py-12">
    <div class="wishlist-page-header">
      <div class="wishlist-page-copy">
        <p class="text-sm font-semibold uppercase tracking-[0.18em] text-[#3b7a62]">Saved Basket</p>
        <h1 class="mt-2 text-3xl font-extrabold text-[#274C5B] sm:text-4xl">Wishlist</h1>
      </div>
      <div class="wishlist-page-actions">
        <a href="index.html" class="wishlist-page-action wishlist-page-action--secondary" aria-label="Back to Shop">
          <span class="wishlist-page-action__icon"><i class="fa-solid fa-arrow-left"></i></span>
          <span class="wishlist-page-action__text">Back to Shop</span>
        </a>
        <button id="clearWishlist" class="wishlist-page-action wishlist-page-action--danger" aria-label="Clear All">
          <span class="wishlist-page-action__icon"><i class="fa-solid fa-trash-can"></i></span>
          <span class="wishlist-page-action__text">Clear All</span>
        </button>
      </div>
    </div>

    <div id="wishlistContainer">
      <!-- Items inserted by JS -->
    </div>

    <script src="./main.js"></script>
  </main>
</body>
</html>
